  <style>
    :root {
      --forge-bg: #1a0000;
      --lava-gradient: linear-gradient(135deg, #330000 0%, #660000 30%, #ff4500 70%, #ff8c00 100%);
      --molten-red: #ff4500;
      --forge-gold: #ffaa00;
      --ember-orange: #ff6600;
      --obsidian-glass: rgba(255, 69, 0, 0.1);
      --crack-border: rgba(255, 165, 0, 0.4);
      --shadow-forge: 0 0 60px rgba(255, 69, 0, 0.7), 0 20px 80px rgba(255, 102, 0, 0.5);
      --shadow-ember: 0 0 80px rgba(255, 165, 0, 0.8);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Inter', sans-serif; 
      background: var(--forge-bg); 
      background-attachment: fixed; 
      color: #ffd4aa; 
      overflow-x: hidden;
    }
    .forge-glass { 
      background: var(--obsidian-glass); 
      backdrop-filter: blur(25px) brightness(1.2); 
      border: 2px solid var(--crack-border); 
      position: relative;
    }
    .forge-glass::before {
      content: ''; position: absolute; inset: 0; 
      background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,165,0,0.05) 10px, rgba(255,165,0,0.05) 20px); 
      border-radius: inherit; pointer-events: none;
    }
    .forge-gold { 
      background: linear-gradient(45deg, var(--forge-gold), #ffdd44); 
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent; 
      background-clip: text; 
      font-family: 'Metal Mania', cursive;
      text-shadow: 0 0 40px var(--forge-gold);
    }
    .molten-glow { 
      color: var(--molten-red); 
      text-shadow: 0 0 30px var(--molten-red);
      animation: glow-pulse 2s ease-in-out infinite alternate;
    }
    @keyframes glow-pulse { 0% { text-shadow: 0 0 20px var(--molten-red); } 100% { text-shadow: 0 0 40px var(--molten-red), 0 0 60px var(--molten-red); } }
    .hero { 
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      position: relative; 
      overflow: hidden; 
      background: var(--lava-gradient);
    }
    #forge-particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    .hero-content { z-index: 3; text-align: center; max-width: 1100px; padding: 0 2rem; }
    h1.hero-title { 
      font-size: clamp(5.5rem, 12vw, 11rem); 
      font-weight: 900; 
      margin-bottom: 1.5rem; 
      font-family: 'Nosifer', cursive;
      letter-spacing: 0.1em; 
      forge-gold;
      position: relative;
    }
    h1.hero-title::after {
      content: '🔥 FORGED IN HELLFIRE'; 
      font-size: 0.3em; 
      position: absolute; bottom: -1rem; left: 50%; transform: translateX(-50%); 
      opacity: 0.7; font-family: 'Creepster', cursive;
    }
    .hero-subtitle { 
      font-size: clamp(1.6rem, 4vw, 3rem); 
      opacity: 0.88; 
      margin-bottom: 4rem; 
      font-weight: 500; 
    }
    .hammer-cta { 
      padding: 2.2rem 4.5rem; 
      background: linear-gradient(45deg, var(--molten-red), var(--forge-gold)); 
      border: 3px solid var(--forge-gold); 
      border-radius: 0; 
      clip-path: polygon(0 0, 100% 0, 100% 85%, 85% 100%, 0 100%); 
      font-size: 1.5rem; 
      font-weight: 900; 
      font-family: 'Metal Mania', cursive;
      color: #000; 
      cursor: pointer; 
      position: relative; 
      overflow: hidden; 
      box-shadow: var(--shadow-forge);
      transition: all 0.6s;
    }
    .hammer-cta:hover { 
      clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%); 
      transform: translateY(-15px) scale(1.08); 
      box-shadow: var(--shadow-ember);
    }
    .section-padding { padding: 180px 0; position: relative; }
    .container { max-width: 1500px; margin: 0 auto; padding: 0 2rem; }
    .section-title { 
      font-size: clamp(4rem, 7vw, 6.5rem); 
      font-weight: 900; 
      text-align: center; 
      margin-bottom: 7rem; 
      forge-gold; 
      font-family: 'Nosifer', cursive;
    }
    .section-title::before {
      content: '▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔'; 
      display: block; font-size: 1.5rem; color: var(--forge-gold); opacity: 0.6;
    }
    .grid-heavy { display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: 4rem; }
    .forge-card { 
      forge-glass; 
      padding: 4rem 3rem; 
      border-radius: 0; 
      clip-path: polygon(10% 0, 90% 0, 100% 90%, 90% 100%, 10% 100%, 0 90%); 
      transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94); 
      position: relative;
      background: linear-gradient(145deg, rgba(51,0,0,0.8), rgba(102,0,0,0.6));
    }
    .forge-card:hover { 
      clip-path: polygon(0 0, 100% 0, 100% 95%, 95% 100%, 5% 100%, 0 95%); 
      transform: translateY(-35px) rotate(2deg); 
      box-shadow: var(--shadow-ember);
    }
    .skill-hammer {
      font-size: 3rem; margin-bottom: 1rem; 
      animation: hammer-strike 1.5s ease-in-out infinite;
    }
    @keyframes hammer-strike { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg) scale(1.1); } }
    .progress-forge { 
      height: 16px; 
      background: linear-gradient(90deg, #330000, #660000); 
      border-radius: 8px; 
      overflow: hidden; 
      margin-top: 1.5rem; 
      border: 2px solid var(--crack-border);
    }
    .molten-fill { 
      height: 100%; 
      background: linear-gradient(90deg, var(--molten-red), var(--forge-gold), var(--ember-orange)); 
      border-radius: 6px; 
      transition: width 3s ease-in-out; 
      box-shadow: 0 0 30px var(--molten-red);
      position: relative;
    }
    .molten-fill::after {
      content: ''; position: absolute; top: -2px; right: -2px; 
      width: 20px; height: 20px; 
      background: radial-gradient(circle, #ff8800 0%, transparent); 
      border-radius: 50%; 
      animation: ember-spark 2s infinite;
    }
    @keyframes ember-spark { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(2) translateX(20px); } }
    .projects { background: radial-gradient(ellipse at center, rgba(51,0,0,0.9) 0%, transparent 70%); }
    .contact-forge { max-width: 900px; margin: 0 auto; }
    .forge-btn { 
      background: var(--lava-gradient); 
      padding: 2.5rem 5rem; 
      border: 4px solid var(--forge-gold); 
      border-radius: 0; 
      clip-path: polygon(0 0, 100% 0, 100% 80%, 80% 100%, 0 100%); 
      color: #fff; 
      font-size: 1.4rem; 
      font-weight: 900; 
      font-family: 'Metal Mania', cursive;
      cursor: pointer; 
      width: 100%; 
      box-shadow: var(--shadow-forge);
      transition: all 0.7s;
    }
    .forge-btn:hover { 
      clip-path: polygon(5% 0, 100% 0, 95% 100%, 5% 95%); 
      transform: scale(1.05); 
      box-shadow: var(--shadow-ember);
    }
    footer { 
      background: linear-gradient(to top, #000, var(--forge-bg)); 
      padding: 6rem 0 3rem; 
      text-align: center; 
      border-top: 4px solid var(--crack-border);
    }
    .forge-links { display: flex; justify-content: center; gap: 3rem; flex-wrap: wrap; margin-top: 3rem; }
    .forge-link { 
      padding: 1.5rem 2.5rem; 
      background: rgba(255,69,0,0.2); 
      border: 2px solid var(--crack-border); 
      border-radius: 12px; 
      text-decoration: none; 
      color: inherit; 
      font-weight: 600; 
      transition: all 0.5s;
    }
    .forge-link:hover { 
      background: var(--molten-red); 
      transform: translateY(-10px) scale(1.1); 
      box-shadow: var(--shadow-forge);
    }
  </style>
</head>
<body>
  <div id="forge-loader" style="position: fixed; inset: 0; background: var(--forge-bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Nosifer', cursive; font-size: clamp(2rem, 5vw, 4rem); color: var(--forge-gold); text-shadow: 0 0 50px var(--forge-gold);">
    <div>🔥 FORGING EMPIRE 🔥</div>
    <div style="font-size: 0.5em; margin-top: 2rem; font-family: 'Metal Mania';">Ayman Fostok</div>
  </div>

  <nav class="fixed top-0 w-full z-50 py-8 forge-glass transition-all duration-1000">
    <div class="container flex justify-between items-center">
      <h2 class="text-4xl font-black forge-gold drop-shadow-2xl">FORGE</h2>
      <ul class="flex space-x-12">
        <li><a href="#home" class="text-xl font-bold hover:molten-glow transition-all hover:scale-125 duration-500">Hellfire</a></li>
        <li><a href="#about" class="text-xl font-bold hover:molten-glow transition-all hover:scale-125 duration-500">Anvil</a></li>
        <li><a href="#skills" class="text-xl font-bold hover:molten-glow transition-all hover:scale-125 duration-500">Hammer</a></li>
        <li><a href="#projects" class="text-xl font-bold hover:molten-glow transition-all hover:scale-125 duration-500">Vault</a></li>
        <li><a href="#contact" class="text-xl font-bold hover:molten-glow transition-all hover:scale-125 duration-500">Forge</a></li>
      </ul>
    </div>
  </nav>

  <section id="home" class="hero">
    <div id="forge-particles"></div>
    <canvas id="forge-globe" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;"></canvas>
    <div class="hero-content">
      <h1 class="hero-title">INFERNO FORGE</h1>
      <p class="hero-subtitle">OSINT Molten • AI Hellsteel • Threat Crucible</p>
      <button class="hammer-cta" onclick="scrollToContact()">STRIKE ALLIANCE</button>
    </div>
  </section>

  <!-- Rest of sections similar structure with forge styling, adapted for brevity in this response -->

  <script>
    // Loader hammer animation
    let forgeCount = 0;
    const hammerText = ['INITIALIZING', 'MELTING', 'HAMMERING', 'FORGING', 'TEMPERING', 'EMPIRE READY'];
    const loader = document.getElementById('forge-loader');
    const hammerInterval = setInterval(() => {
      forgeCount++;
      loader.querySelector('div:first-child').textContent = hammerText[forgeCount % hammerText.length];
      if (forgeCount > 20) {
        clearInterval(hammerInterval);
        gsap.to(loader, { opacity: 0, duration: 1, onComplete: () => loader.remove() });
      }
    }, 300);

    // Fire particles
    particlesJS('forge-particles', {
      particles: {
        number: { value: 120 },
        color: { value: ['#ff4500', '#ff6600', '#ffaa00', '#ffdd44'] },
        shape: { type: ['circle', 'triangle'] },
        opacity: { value: 0.7 },
        size: { value: 5, random: true },
        line_linked: { enable: false },
        move: { speed: 4, direction: 'top', out_mode: 'out' }
      },
      interactivity: { events: { onhover: { enable: true, mode: 'grab' } } }
    });

    // Molten globe shader
    // (Similar Three.js molten lava shader code as before, adapted for red/orange glow)

    // Heavy hammer GSAP on cards
    gsap.from('.forge-card', {
      scrollTrigger: '.container',
      y: 100, rotation: 10, opacity: 0, duration: 1.5, stagger: 0.3
    });

    function scrollToContact() {
      document.getElementById('contact').scrollIntoView({ behavior: 'smooth' });
    }
  </script>
</body>
